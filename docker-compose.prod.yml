# Production compose for a self-hosted server (e.g. the AWS EC2 behind the
# `prism.botree.ai` ALB). Publishes the API on host port 8888 so the load
# balancer's target group (EC2:8888) forwards straight to it.
#
# The app database is Neon (Postgres + pgvector) — set PG_DSN in .env to your
# Neon connection string. The analytics MySQL is the Bisk Farm server, reached
# via the SSH tunnel (SSH_HOST=3.109.63.248) using the key supplied as
# SSH_KEY_B64 in .env and materialized to SSH_KEY_PATH on startup — no key file
# needs to be pre-placed on the host. No local db/mysql containers here.

services:
  api:
    build:
      context: .
      args:
        # Bake the embedding model into the image so it isn't downloaded at
        # runtime (needs the model files during build; ~500MB layer).
        PRELOAD_EMBEDDINGS: "true"
    env_file: .env
    environment:
      # Match the ALB target-group port. Uvicorn reads ${PORT} (see Dockerfile).
      PORT: "8888"
    ports:
      - "8888:8888"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8888/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
